version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      semver-major-days: 9
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5
    versioning-strategy: "increase-if-necessary"
    groups:
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      semver-major-days: 9
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
